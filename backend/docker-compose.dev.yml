# Development compose: docker compose -f docker-compose.dev.yml up

services:
  # ============================================
  # NestJS Application (Dev with hot-reload)
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: inside-line-api-dev
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-inside_line}
      DEV_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-inside_line}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-at-least-32-characters-long!!}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      APP_URL: http://localhost:8080
      FRONTEND_URL: http://localhost:3000
      ENABLE_SWAGGER: "true"
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-r2}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://localhost:9000}
      STORAGE_REGION: ${STORAGE_REGION:-auto}
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID:-}
      STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY:-}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-App <noreply@example.com>}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - inside-line-dev

  # ============================================
  # PostgreSQL Database (Dev)
  # ============================================
  db:
    image: postgres:16-alpine
    container_name: inside-line-db-dev
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-inside_line}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - inside-line-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-inside_line}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================
  # Redis (for BullMQ queues)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: inside-line-redis-dev
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_dev:/data
    networks:
      - inside-line-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data_dev:
    driver: local
  redis_data_dev:
    driver: local

networks:
  inside-line-dev:
    driver: bridge
