services:
  # ============================================
  # NestJS Application (Production)
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inside-line-api
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-false}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-r2}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
      STORAGE_REGION: ${STORAGE_REGION:-auto}
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID}
      STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-App <noreply@example.com>}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - inside-line-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # Redis (for BullMQ queues)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: inside-line-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - inside-line-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  redis_data:
    driver: local

networks:
  inside-line-network:
    driver: bridge
